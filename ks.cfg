#version=RHEL8
install
url --url="http://192.168.0.170/rocky8"

lang en_US.UTF-8
keyboard us

network --bootproto=dhcp --device=eth0 --onboot=on

rootpw redhat
firewall --disabled
selinux --disabled
timezone Asia/Kolkata

bootloader --location=mbr
clearpart --all --initlabel
autopart

reboot

%packages
@^minimal-environment
%end

%post
echo "Kickstart installation completed" > /root/ks-log.txt
%end
